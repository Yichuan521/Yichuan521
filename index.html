<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anime Blog // 星屑日记</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

body{
  background: radial-gradient(circle at top, #1a1033, #05040a);
  color:#fff;
  overflow-x:hidden;
}

/* 背景粒子 */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* 整体布局 */
.container{
  display:flex;
  min-height:100vh;
}

/* 左侧栏 */
.sidebar{
  width:260px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  margin:10px auto;
  background: linear-gradient(45deg,#ff6bd6,#6bd6ff);
  box-shadow:0 0 20px #ff6bd6;
}

.name{
  text-align:center;
  margin-top:10px;
  font-size:18px;
}

.desc{
  text-align:center;
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}

.menu{
  margin-top:30px;
}

.menu div{
  padding:10px;
  margin:8px 0;
  background: rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.menu div:hover{
  background: rgba(255,105,180,0.3);
  transform: translateX(5px);
}

/* 主内容 */
.main{
  flex:1;
  padding:30px;
}

.header{
  font-size:28px;
  margin-bottom:20px;
  background: linear-gradient(90deg,#ff6bd6,#6bd6ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* 博客卡片 */
.post{
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  transition:0.3s;
}

.post:hover{
  transform: translateY(-5px);
  box-shadow:0 10px 30px rgba(255,105,180,0.2);
}

.post h2{
  color:#ffb3e6;
  margin-bottom:10px;
}

.post p{
  color:#ccc;
  font-size:14px;
  line-height:1.6;
}

.tag{
  display:inline-block;
  margin-top:10px;
  padding:3px 8px;
  font-size:12px;
  border-radius:8px;
  background: rgba(255,105,180,0.2);
  color:#ffb3e6;
}

/* 响应式 */
@media(max-width:768px){
  .container{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

  <!-- 左侧 -->
  <div class="sidebar">
    <div class="avatar"></div>
    <div class="name">星屑少女 / NeoBlog</div>
    <div class="desc">“在数据宇宙里写日记”</div>

    <div class="menu">
      <div>🏠 首页</div>
      <div>📚 博客</div>
      <div>🎨 作品</div>
      <div>🌌 关于我</div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <div class="header">✨ 星屑日记 / BLOG</div>

    <div class="post">
      <h2>今天的代码像星空一样闪烁</h2>
      <p>我在写一个二次元博客网站，背景是紫色的宇宙，像是进入了一个平行世界。</p>
      <span class="tag">#日常</span>
    </div>

    <div class="post">
      <h2>AI与人类的边界</h2>
      <p>如果AI可以写诗、画画、做设计，那“创作”的定义是否正在被重新书写？</p>
      <span class="tag">#思考</span>
    </div>

    <div class="post">
      <h2>科幻UI设计练习</h2>
      <p>尝试做了一套霓虹风格UI，感觉像在操作未来的操作系统。</p>
      <span class="tag">#设计</span>
    </div>

  </div>

</div>

<script>
// 粒子背景
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="rgba(255,105,180,0.7)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
