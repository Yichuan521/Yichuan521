<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light dark">
  <title>个人主页 | My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <!-- 复制文本专用库 -->
  <script src="https://cdn.jsdelivr.net/npm/clipboard@2.0.11/dist/clipboard.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#6366f1',
            secondary: '#a855f7',
            darkbg: '#0f172a',
            lightbg: '#f8fafc'
          },
          animation: {
            'float': 'float 4s ease-in-out infinite',
            'typing': 'typing 2s steps(30) forwards, blink .6s infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            typing: { from: { width: 0 } },
            blink: { '50%': { borderColor: 'transparent' } }
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer utilities {
      .glass {
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.18);
      }
      .dark-glass {
        background: rgba(15,23,42,0.65);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.1);
      }
      .text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        background-image: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      }
      .shadow-glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.35); }
      .avatar-ring {
        background: linear-gradient(135deg,#6366f1,#a855f7,#ec4899);
        padding: 4px;
        border-radius: 9999px;
      }
    }
    * { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
    #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top:0; left:0; }
  </style>
</head>

<body class="bg-darkbg dark:text-white text-gray-900 min-h-screen transition-colors duration-500">
  <div id="particles-js"></div>

  <main class="min-h-screen flex flex-col items-center justify-center px-4 py-16">
    <div class="dark-glass rounded-3xl p-8 md:p-12 w-full max-w-xl shadow-glow animate-float">
      <div class="flex justify-center mb-6">
        <div class="avatar-ring">
          <img 
            id="qqAvatar"
            src="https://q1.qlogo.cn/g?b=qq&nk=3459994583&s=640" 
            class="w-36 h-36 md:w-40 md:h-40 rounded-full object-cover"
          >
        </div>
      </div>

      <h1 class="text-[clamp(2rem,5vw,2.8rem)] font-bold text-gradient text-center mb-3">
        我的个人主页
      </h1>

      <div class="text-center text-lg md:text-xl mb-8 text-gray-300 h-7 overflow-hidden">
        <span id="typeText" class="whitespace-nowrap border-r-2 border-primary pr-1 animate-typing"></span>
      </div>

      <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-primary to-transparent mb-8"></div>

      <div class="space-y-4 mb-10 text-gray-200">
        <div class="flex items-center gap-3">
          <i class="fa fa-code text-secondary text-xl w-6 text-center"></i>
          <span>前端 / 静态站爱好者</span>
        </div>
        <div class="flex items-center gap-3">
          <i class="fa fa-tags text-pink-400 text-xl w-6 text-center"></i>
          <span>HTML / CSS / JS / 毛玻璃UI / 动态粒子特效</span>
        </div>
        <!-- 真实访客IP识别模块 -->
        <div class="glass rounded-xl p-3 mt-2">
          <h3 class="text-green-400 font-semibold mb-2 flex items-center gap-2">
            <i class="fa fa-desktop"></i> 访客访问信息
          </h3>
          <p class="pl-6 text-sm">
            公网IP：<span id="visitorIp" class="text-white">正在联网识别...</span>
            <br>
            访问属地：<span id="visitorArea" class="text-white">等待获取地理位置</span>
          </p>
        </div>
      </div>

      <div class="flex justify-center gap-4 flex-wrap">
        <!-- QQ：客户端协议 + 网页在线会话兜底，兼容所有设备 -->
        <a href="https://wpa.qq.com/msgrd?v=3&uin=3459994583&site=qq&menu=yes" 
           onclick="window.open('tencent://AddContact/?fromId=45&fromSubId=1&subcmd=all&uin=3459994583');return true;"
           target="_blank"
           class="glass hover:shadow-glow w-12 h-12 rounded-full flex items-center justify-center text-xl transition-all hover:scale-110 text-white">
          <i class="fa fa-qq"></i>
        </a>
        <!-- GitHub -->
        <a href="https://github.com/Yichuan521" target="_blank"
           class="glass hover:shadow-glow w-12 h-12 rounded-full flex items-center justify-center text-xl transition-all hover:scale-110 text-white">
          <i class="fa fa-github"></i>
        </a>
        <!-- 微信按钮：复制微信号+唤起微信 -->
        <button class="weixin-copy-btn glass hover:shadow-glow w-12 h-12 rounded-full flex items-center justify-center text-xl transition-all hover:scale-110 text-white"
                data-clipboard-text="MAOaF6r-RAUMmkPR4MRE7eA">
          <i class="fa fa-wechat"></i>
        </button>
        <!-- Foxmail邮箱 -->
        <a href="mailto:yichuan-521@foxmail.com" target="_blank"
           class="glass hover:shadow-glow w-12 h-12 rounded-full flex items-center justify-center text-xl transition-all hover:scale-110 text-white">
          <i class="fa fa-envelope"></i>
        </a>
      </div>
    </div>

    <footer class="mt-12 text-gray-400 text-sm text-center">
      <p>© 2026 Personal Static Site | Powered by Pure HTML CSS JS</p>
    </footer>
  </main>

  <script>
    // 粒子背景
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#6366f1" },
        shape: { type: "circle" },
        opacity: { value: 0.4, random: true },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 140, color: "#a855f7", opacity: 0.2, width: 1 },
        move: { enable: true, speed: 1.2, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "grab" },
          onclick: { enable: true, mode: "push" },
          resize: true
        },
        modes: { grab: { distance: 180, line_linked: { opacity: 0.6 } }, push: { particles_nb: 4 } }
      },
      retina_detect: true
    });

    // 自动跟随系统深浅色
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    function setTheme(e) {
      if (e.matches) document.body.classList.add('dark');
      else document.body.classList.remove('dark');
    }
    setTheme(mediaQuery);
    mediaQuery.addEventListener('change', setTheme);

    // 打字机文字
    const textArr = [
      "热爱前端 · 极简美学 · 静态站点",
      "专注精致UI与流畅交互动效",
      "欢迎通过下方联系方式与我交流"
    ];
    let textIndex = 0, charIndex = 0, isDelete = false;
    const typeDom = document.getElementById('typeText');
    function typeWrite() {
      const curText = textArr[textIndex];
      if(!isDelete) {
        typeDom.innerText = curText.substring(0, charIndex++);
        if(charIndex > curText.length) {
          isDelete = true;
          setTimeout(typeWrite, 2000);
          return;
        }
      } else {
        typeDom.innerText = curText.substring(0, charIndex--);
        if(charIndex < 0) {
          isDelete = false;
          textIndex = (textIndex + 1) % textArr.length;
        }
      }
      setTimeout(typeWrite, isDelete ? 60 : 100);
    }
    typeWrite();

    // 头像加载兜底
    const avatarImg = document.getElementById('qqAvatar');
    avatarImg.onerror = () => {
      avatarImg.src = "https://picsum.photos/id/1005/640/640";
    }

    // ========== 微信复制+唤起逻辑 ==========
    new ClipboardJS('.weixin-copy-btn');
    document.querySelector('.weixin-copy-btn').addEventListener('click', function(){
      alert('微信号已复制！打开微信 → 右上角添加朋友，粘贴搜索即可');
      // 尝试唤起微信APP
      if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
        window.location.href = 'weixin://';
      }
    })

    // ========== 真实公网IP+地理位置识别核心代码 ==========
    const ipDom = document.getElementById('visitorIp');
    const areaDom = document.getElementById('visitorArea');

    async function getPublicIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
      } catch (err) {
        return null;
      }
    }

    async function getIpLocation(ip) {
      if (!ip) throw new Error('IP获取失败');
      try {
        const res = await fetch(`https://geo.iproyal.com/api/${ip}`);
        const loc = await res.json();
        return `${loc.country || ''} ${loc.region || ''} ${loc.city || ''}`;
      } catch (err) {
        return '地理位置接口请求失败';
      }
    }

    (async function runIpDetect() {
      const ip = await getPublicIP();
      if (!ip) {
        ipDom.innerText = 'IP识别失败';
        areaDom.innerText = '网络环境无法获取公网地址';
        return;
      }
      ipDom.innerText = ip;
      const locationText = await getIpLocation(ip);
      areaDom.innerText = locationText;
    })();
  </script>
</body>
</html>
